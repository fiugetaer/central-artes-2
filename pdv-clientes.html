<!-- CONTEÚDO -->
<main class="pdv-main">

    <div class="pdv-topbar">
        <span class="topbar-label">Portal</span>
        <div class="topbar-actions">
            <div class="avatar" id="userAvatar">AD</div>
        </div>
    </div>

    <div class="pdv-content">

        <div class="page-header">
            <div class="page-header-left">
                <h1>Clientes</h1>
                <p>Cadastro de clientes do portal</p>
            </div>
            <button class="btn-primary" onclick="abrirModalCliente()">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Novo cliente
            </button>
        </div>

        <div class="table-card">
            <div class="table-toolbar">
                <div class="search-box">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="buscaCliente" placeholder="Pesquisar por nome, empresa, e-mail..." oninput="filtrarClientes()">
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Empresa</th>
                        <th>Documento</th>
                        <th>Contato</th>
                        <th>Cidade/UF</th>
                        <th style="text-align:right">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaClientes">
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">Carregando clientes...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</main>

<!-- MODAL CLIENTE -->
<div class="modal-overlay" id="modalCliente">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalClienteTitulo">Novo Cliente</h2>
            <button class="modal-close" onclick="fecharModalCliente()">×</button>
        </div>

        <input type="hidden" id="clienteId">

        <div class="form-grid">
            <div class="campo">
                <label>Nome *</label>
                <input type="text" id="clienteNome" placeholder="Nome completo">
            </div>
            <div class="campo">
                <label>Empresa</label>
                <input type="text" id="clienteEmpresa" placeholder="Razão social ou nome fantasia">
            </div>
            <div class="campo">
                <label>CPF / CNPJ</label>
                <input type="text" id="clienteDocumento" placeholder="000.000.000-00">
            </div>
            <div class="campo">
                <label>Telefone</label>
                <input type="tel" id="clienteTelefone" placeholder="(92) 3456-7890">
            </div>
            <div class="campo">
                <label>WhatsApp</label>
                <input type="tel" id="clienteWhatsapp" placeholder="(92) 99999-9999">
            </div>
            <div class="campo">
                <label>E-mail</label>
                <input type="email" id="clienteEmail" placeholder="email@empresa.com">
            </div>
            <div class="campo full">
                <label>Endereço</label>
                <input type="text" id="clienteEndereco" placeholder="Rua, número, bairro">
            </div>
            <div class="campo">
                <label>Cidade</label>
                <input type="text" id="clienteCidade" placeholder="Manaus">
            </div>
            <div class="campo">
                <label>Estado</label>
                <select id="clienteEstado">
                    <option value="">UF</option>
                    <option value="AC">AC</option><option value="AL">AL</option>
                    <option value="AM" selected>AM</option><option value="AP">AP</option>
                    <option value="BA">BA</option><option value="CE">CE</option>
                    <option value="DF">DF</option><option value="ES">ES</option>
                    <option value="GO">GO</option><option value="MA">MA</option>
                    <option value="MG">MG</option><option value="MS">MS</option>
                    <option value="MT">MT</option><option value="PA">PA</option>
                    <option value="PB">PB</option><option value="PE">PE</option>
                    <option value="PI">PI</option><option value="PR">PR</option>
                    <option value="RJ">RJ</option><option value="RN">RN</option>
                    <option value="RO">RO</option><option value="RR">RR</option>
                    <option value="RS">RS</option><option value="SC">SC</option>
                    <option value="SE">SE</option><option value="SP">SP</option>
                    <option value="TO">TO</option>
                </select>
            </div>
            <div class="campo full">
                <label>Observações</label>
                <textarea id="clienteObs" placeholder="Informações adicionais sobre o cliente..."></textarea>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-secondary" onclick="fecharModalCliente()">Cancelar</button>
            <button class="btn-primary" onclick="salvarCliente()">
                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                Salvar cliente
            </button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="pdv-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>

var todosClientes = [];

document.addEventListener("DOMContentLoaded", async function() {
    var sess = await supabaseClient.auth.getSession();
    if (!sess.data.session) { window.location.href = "login.html"; return; }

    var email = sess.data.session.user.email || "";
    document.getElementById("userAvatar").textContent = email.slice(0, 2).toUpperCase();

    await carregarClientes();
});

async function carregarClientes() {
    var tbody = document.getElementById("tabelaClientes");
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">Carregando...</div></td></tr>';

    var res = await supabaseClient
        .from("clientes")
        .select("*")
        .eq("ativo", true)
        .order("nome");

    if (res.error) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">Erro ao carregar clientes.</div></td></tr>';
        return;
    }

    todosClientes = res.data || [];
    renderizarClientes(todosClientes);
}

function renderizarClientes(lista) {
    var tbody = document.getElementById("tabelaClientes");

    if (lista.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">' +
            '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>' +
            'Nenhum cliente cadastrado. Clique em "Novo cliente" para começar.' +
        '</div></td></tr>';
        return;
    }

    tbody.innerHTML = "";
    lista.forEach(function(c) {
        var cidadeUF = [c.cidade, c.estado].filter(Boolean).join("/") || "—";
        var contato  = c.whatsapp || c.telefone || "—";

        tbody.innerHTML += '<tr>' +
            '<td style="font-weight:600;color:#0f172a;">' + c.nome + '</td>' +
            '<td class="td-categoria">' + (c.empresa || "—") + '</td>' +
            '<td style="font-size:13px;color:#64748b;">' + (c.cpf_cnpj || "—") + '</td>' +
            '<td style="font-size:13px;">' + contato + '</td>' +
            '<td style="font-size:13px;color:#64748b;">' + cidadeUF + '</td>' +
            '<td><div class="td-acoes">' +
                '<button class="btn-edit" onclick="editarCliente(' + c.id + ')" title="Editar">' +
                    '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
                '</button>' +
                '<button class="btn-danger" onclick="excluirCliente(' + c.id + ', \'' + c.nome.replace(/'/g, "\\'") + '\')" title="Excluir">' +
                    '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>' +
                '</button>' +
            '</div></td>' +
        '</tr>';
    });
}

function filtrarClientes() {
    var busca = document.getElementById("buscaCliente").value.toLowerCase();
    if (!busca) { renderizarClientes(todosClientes); return; }
    var filtrados = todosClientes.filter(function(c) {
        return (c.nome || "").toLowerCase().includes(busca) ||
               (c.empresa || "").toLowerCase().includes(busca) ||
               (c.email || "").toLowerCase().includes(busca) ||
               (c.cpf_cnpj || "").includes(busca);
    });
    renderizarClientes(filtrados);
}

function abrirModalCliente() {
    document.getElementById("modalClienteTitulo").textContent = "Novo Cliente";
    ["clienteId","clienteNome","clienteEmpresa","clienteDocumento",
     "clienteTelefone","clienteWhatsapp","clienteEmail",
     "clienteEndereco","clienteCidade","clienteObs"].forEach(function(id) {
        document.getElementById(id).value = "";
    });
    document.getElementById("clienteEstado").value = "AM";
    document.getElementById("modalCliente").classList.add("open");
    document.getElementById("clienteNome").focus();
}

function fecharModalCliente() {
    document.getElementById("modalCliente").classList.remove("open");
}

function editarCliente(id) {
    var c = todosClientes.find(function(x) { return x.id === id; });
    if (!c) return;

    document.getElementById("modalClienteTitulo").textContent = "Editar Cliente";
    document.getElementById("clienteId").value         = c.id;
    document.getElementById("clienteNome").value       = c.nome       || "";
    document.getElementById("clienteEmpresa").value    = c.empresa    || "";
    document.getElementById("clienteDocumento").value  = c.cpf_cnpj   || "";
    document.getElementById("clienteTelefone").value   = c.telefone   || "";
    document.getElementById("clienteWhatsapp").value   = c.whatsapp   || "";
    document.getElementById("clienteEmail").value      = c.email      || "";
    document.getElementById("clienteEndereco").value   = c.endereco   || "";
    document.getElementById("clienteCidade").value     = c.cidade     || "";
    document.getElementById("clienteEstado").value     = c.estado     || "AM";
    document.getElementById("clienteObs").value        = c.observacoes|| "";

    document.getElementById("modalCliente").classList.add("open");
}

async function salvarCliente() {
    var nome = document.getElementById("clienteNome").value.trim();
    var id   = document.getElementById("clienteId").value;

    if (!nome) { toast("O nome do cliente é obrigatório."); return; }

    var dados = {
        nome,
        empresa:     document.getElementById("clienteEmpresa").value.trim(),
        cpf_cnpj:    document.getElementById("clienteDocumento").value.trim(),
        telefone:    document.getElementById("clienteTelefone").value.trim(),
        whatsapp:    document.getElementById("clienteWhatsapp").value.trim(),
        email:       document.getElementById("clienteEmail").value.trim(),
        endereco:    document.getElementById("clienteEndereco").value.trim(),
        cidade:      document.getElementById("clienteCidade").value.trim(),
        estado:      document.getElementById("clienteEstado").value,
        observacoes: document.getElementById("clienteObs").value.trim(),
        updated_at:  new Date().toISOString()
    };

    var res;
    if (id) {
        res = await supabaseClient.from("clientes").update(dados).eq("id", id);
    } else {
        res = await supabaseClient.from("clientes").insert([{ ...dados, ativo: true }]);
    }

    if (res.error) { console.error(res.error); toast("Erro ao salvar cliente."); return; }

    toast(id ? "✅ Cliente atualizado!" : "✅ Cliente cadastrado!");
    fecharModalCliente();
    carregarClientes();
}

async function excluirCliente(id, nome) {
    if (!confirm('Excluir o cliente "' + nome + '"?')) return;
    var res = await supabaseClient.from("clientes").update({ ativo: false }).eq("id", id);
    if (res.error) { toast("Erro ao excluir cliente."); return; }
    toast("Cliente removido.");
    carregarClientes();
}

document.getElementById("modalCliente").addEventListener("click", function(e) {
    if (e.target === this) fecharModalCliente();
});

function toast(msg) {
    var t = document.getElementById("pdv-toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(function() { t.classList.remove("show"); }, 2500);
}

</script>
</body>
