<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Comercial | GACC-AM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8edf5 0%, #f0f4ff 50%, #e4ecf7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .entrada {
            text-align: center;
            padding: 40px 20px;
        }

        .icone-portal {
            width: 80px;
            height: 80px;
            background: #2563eb;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            box-shadow: 0 8px 32px rgba(37, 99, 235, 0.3);
        }

        .icone-portal svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: white;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .entrada h1 {
            font-size: 42px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .entrada p {
            font-size: 16px;
            color: #64748b;
            max-width: 360px;
            margin: 0 auto 36px;
            line-height: 1.6;
        }

        .btn-acessar {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all .2s;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35);
        }

        .btn-acessar:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4);
        }

        .btn-acessar svg {
            width: 18px;
            height: 18px;
            stroke: white;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .voltar-link {
            display: block;
            margin-top: 24px;
            font-size: 14px;
            color: #94a3b8;
            text-decoration: none;
            transition: color .2s;
        }

        .voltar-link:hover { color: #64748b; }
    </style>
</head>
<body>

<div class="entrada">
    <div class="icone-portal">
        <svg viewBox="0 0 24 24">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
        </svg>
    </div>

    <h1>Portal Comercial</h1>
    <p>Gestão de orçamentos, clientes, produtos e vendas externas.</p>

    <a href="pdv-dashboard.html" class="btn-acessar">
        Acessar o portal
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>

    <a href="index.html" class="voltar-link">← Voltar para a Central de Artes</a>
</div>

</body>
</html>
